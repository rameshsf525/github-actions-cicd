<template>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
        aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <!-- modal header start -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close" title="Close"
                    onclick={closeHandler}> <!--STRY0570594-->
                    <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small">
                    </lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-text-heading_medium slds-hyphenate">Recall Campaign Data</h2>
            </header>
            <!-- modal body start -->
            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Expires Date" value={selectedExpiresDate} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Source" value={selectedSource} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Labour Ops" value={selectedLabourOps} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Government Agency" value={selectedAgency} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Field Action Description" value={selectedfieldDesc} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Safety Risk Description" value={selectedSafetyDesc} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Point Rattrape" value={selectedPointRattrape} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Group" value={selectedGroup} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Sub Group" value={selectedSubGroup} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Repair Description" value={selectedRepairDesc} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Option Code" value={selectedOptionCode} readonly="true">
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_4-of-12 slds-p-horizontal--medium slds-m-bottom_medium">
                        <lightning-input label="Notes" value={selectedNotes} readonly="true">
                        </lightning-input>
                    </div>
                </div>
                <!-- modal footer start-->
                <footer class="slds-modal__footer">
                    <button class="slds-button slds-button--destructive" onclick={closeHandler}>Close</button>
                </footer>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open">
    </div>
</template>
